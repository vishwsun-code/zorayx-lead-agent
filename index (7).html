<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zorayx Lead Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#e8e8f0;font-size:14px}
.header{background:linear-gradient(135deg,#0d1117,#111827);border-bottom:1px solid #1e2535;padding:16px 18px 0}
.hinner{max-width:880px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.licon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#00c2a8,#0080ff);display:flex;align-items:center;justify-content:center;font-size:16px}
.ltitle{font-size:17px;font-weight:700}
.lsub{font-size:11px;color:#5a6478;margin-top:1px}
.tabs{display:flex;margin-top:12px}
.tab{padding:8px 16px;border:none;background:transparent;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all 0.2s}
.th{color:#00c2a8;border-bottom-color:#00c2a8;font-weight:700}
.te{color:#ff6b35;border-bottom-color:#ff6b35;font-weight:700}
.toff{color:#5a6478}
.main{max-width:880px;margin:0 auto;padding:16px}
.panel{background:#0d1117;border:1px solid #1e2535;border-radius:13px;padding:14px 16px;margin-bottom:12px}
.ptitle{font-size:12px;font-weight:600;color:#a0aab8;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;color:#3a4255;background:#1e2535;padding:2px 7px;border-radius:20px}
.gbadge{font-size:10px;color:#00c2a8;background:#00c2a822;border:1px solid #00c2a833;padding:2px 7px;border-radius:20px}
.auto-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#00c2a822;border:1px solid #00c2a855;color:#00c2a8;display:none;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#00c2a8;animation:pulse 1.5s infinite;display:inline-block}
select,input,textarea{width:100%;background:#1a2235;border:1px solid #252d3d;border-radius:8px;color:#e8e8f0;padding:7px 10px;font-size:13px;outline:none;font-family:inherit}
textarea{resize:vertical;line-height:1.5}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:8px}
.f1{flex:1;min-width:160px}
button{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
.bp{background:linear-gradient(135deg,#00c2a8,#0080ff);color:#fff}
.bstop{background:#3d1515;color:#ff6b6b}
.bghost{background:#1e2535;border:1px solid #2a3347;color:#a0aab8}
.bpush{background:#1e2535;border:1px solid #2a3347;color:#a0aab8;font-weight:600}
.bpush.ok{background:#00c2a822;border-color:#00c2a855;color:#00c2a8}
button:disabled{opacity:0.45;cursor:not-allowed}
.log{margin-top:10px;border-top:1px solid #1e2535;padding-top:8px;display:none}
.logtitle{font-size:10px;color:#3a4255;margin-bottom:5px;letter-spacing:1px}
.logentry{font-size:11px;margin-bottom:2px}
.lt{color:#3a4255;margin-right:6px}
.spanel{background:#111827;border:1px solid #1e2535;border-radius:13px;padding:14px 16px;margin-bottom:16px}
.hint{font-size:11px;color:#5a6478;margin-bottom:7px}
.loader{text-align:center;padding:30px 0;color:#5a6478;display:none}
.spinner{width:30px;height:30px;border-radius:50%;border:3px solid #1e2535;border-top-color:#00c2a8;margin:0 auto 10px;animation:spin 0.8s linear infinite}
.err{background:#1a0e0e;border:1px solid #3d1515;border-radius:10px;padding:10px 14px;color:#ff6b6b;font-size:12px;margin-bottom:12px;display:none}
.pmsg{margin-top:7px;font-size:12px;display:none}
.rtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.rtab{padding:4px 11px;border-radius:20px;border:1px solid #1e2535;background:#0d1117;color:#5a6478;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
.rtab.on{background:#00c2a822;border-color:#00c2a855;color:#00c2a8;font-weight:700}
.prog{background:#0d1117;border:1px solid #1e2535;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none}
.pbar-bg{background:#1e2535;border-radius:20px;height:5px;margin:6px 0}
.pbar{background:linear-gradient(90deg,#00c2a8,#0080ff);height:5px;border-radius:20px;transition:width 0.4s;width:0%}
.pstat{font-size:11px;color:#5a6478}
.rhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.rtitle{font-size:14px;font-weight:600}
.rsub{color:#5a6478;font-weight:400;font-size:11px;margin-left:6px}
.lcard{background:#111827;border:1px solid #1e2535;border-radius:13px;padding:12px 15px;margin-bottom:8px;transition:border-color 0.2s}
.lcard:hover{border-color:#00c2a855}
.lname{font-size:14px;font-weight:700;margin-right:6px}
.lbadge{font-size:10px;padding:2px 7px;border-radius:20px;background:#1e2535;color:#a0aab8}
.sbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.lloc{font-size:11px;color:#6a7485;margin:4px 0 6px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px}
.cbox{background:#0d1117;border:1px solid #1e2535;border-radius:9px;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.ci{font-size:11px}
.cl{color:#5a6478}
.ct{color:#00c2a8}.cb{color:#4a9eff}.cw{color:#c0cad8}
.srclink{font-size:10px;color:#3a4255;margin-top:5px}
.srclink a{color:#4a9eff}
.lnotes{font-size:11px;color:#4a5568;margin-top:4px;font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="header">
<div class="hinner">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div class="logo">
      <div class="licon">⚡</div>
      <div>
        <div class="ltitle">Zorayx Lead Agent</div>
        <div class="lsub">Real-time web search → verified contacts → auto-push to Zorayx every 3hrs</div>
      </div>
    </div>
    <div id="autoBadge" class="auto-badge"><span class="dot"></span>Auto ON · <span id="countdown">—</span></div>

  <div class="tabs">
    <button class="tab th" id="tabH" onclick="switchTab('hospital')">🏥 Hospitals & Clinics</button>
    <button class="tab toff" id="tabE" onclick="switchTab('engineer')">🔧 Biomedical Engineers</button>
  </div>
</div>
</div>

<div class="main">

<!-- AUTO PUSH PANEL -->
<div class="panel">
  <div class="ptitle">⏱ Auto-Push to Zorayx <span class="badge">every 3 hours</span><span class="gbadge">🌐 Live web search</span></div>
  <div class="rtabs">
    <button class="rtab on" id="art-india" onclick="setAutoRegion('india')">🇮🇳 India (All States)</button>
    <button class="rtab" id="art-asia" onclick="setAutoRegion('asia')">🌏 Asia</button>
    <button class="rtab" id="art-both" onclick="setAutoRegion('both')">🌐 India + Asia</button>
  </div>
  <div class="row">
    <div class="f1">
      <select id="autoType" style="margin-bottom:6px">
        <option value="hospital">🏥 Hospitals & Clinics (Medical Equipment Buyers)</option>
        <option value="engineer">🔧 Biomedical Engineers (REMED Platform)</option>
      </select>
      <input id="autoQuery" type="text" placeholder="e.g. Private hospitals with ICU setup 50+ beds"/>
    </div>
    <button id="autoBtn" class="bp" onclick="toggleAuto()">▶ Start Auto</button>
  </div>
  <div id="autoLog" class="log"><div class="logtitle">RUN LOG</div><div id="logEntries"></div></div>
</div>

<!-- MANUAL SEARCH PANEL -->
<div class="spanel">
  <div class="hint"><span id="dotClr" style="color:#00c2a8">●</span> Manual search — live web results with real contacts</div>
  <div class="rtabs">
    <button class="rtab on" id="mrt-india" onclick="setManualRegion('india')">🇮🇳 India</button>
    <button class="rtab" id="mrt-asia" onclick="setManualRegion('asia')">🌏 Asia</button>
    <button class="rtab" id="mrt-custom" onclick="setManualRegion('custom')">✏️ Custom</button>
  </div>
  <div id="stateDiv" style="margin-bottom:7px">
    <select id="stateSelect">
      <option value="all">All States (sweep)</option>
      <option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
      <option>Bihar</option><option>Chhattisgarh</option><option>Delhi</option><option>Goa</option>
      <option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option>
      <option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
      <option>Madhya Pradesh</option><option>Maharashtra</option><option>Manipur</option>
      <option>Meghalaya</option><option>Mizoram</option><option>Nagaland</option><option>Odisha</option>
      <option>Punjab</option><option>Rajasthan</option><option>Sikkim</option><option>Tamil Nadu</option>
      <option>Telangana</option><option>Tripura</option><option>Uttar Pradesh</option>
      <option>Uttarakhand</option><option>West Bengal</option>
    </select>
  </div>
  <div id="countryDiv" style="margin-bottom:7px;display:none">
    <select id="countrySelect">
      <option value="all">All Asian Countries (sweep)</option>
      <option>Bangladesh</option><option>Sri Lanka</option><option>Nepal</option>
      <option>Myanmar</option><option>Thailand</option><option>Vietnam</option>
      <option>Malaysia</option><option>Singapore</option><option>Indonesia</option>

      <option>Kuwait</option><option>Bahrain</option><option>Oman</option>
      <option>Jordan</option><option>Cambodia</option><option>Laos</option>
      <option>Bhutan</option><option>Maldives</option>
    </select>
  </div>
  <textarea id="mQuery" rows="2" placeholder="Describe what you're looking for e.g. Private hospitals with ICU and 50+ beds"></textarea>
  <div class="row" style="justify-content:flex-end">
    <div id="actBtns" style="display:none;gap:7px">
      <button class="bghost" onclick="exportCSV()">↓ CSV</button>
      <button class="bpush" id="pushBtn" onclick="pushLeads()">↑ Push to Zorayx</button>

    <button class="bp" id="findBtn" onclick="searchLeads()">Find Leads →</button>

</div>

<!-- PROGRESS -->
<div class="prog" id="progBox">
  <div class="pstat" id="progTitle" style="margin-bottom:4px;font-size:12px;color:#a0aab8">Searching…</div>
  <div class="pbar-bg"><div class="pbar" id="pbar"></div></div>
  <div class="pstat" id="progStat">Starting…</div>
</div>

<div class="loader" id="loader"><div class="spinner"></div><div style="font-size:12px">Fetching real-time leads from the web…</div></div>
<div class="err" id="errBox"></div>
<div id="results"></div>
</div>

<script>
const SUPA_URL = "https://xfaduyqyarbnpmtxfuvk.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmYWR1eXF5YXJibnBtdHhmdXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjQ4MTEsImV4cCI6MjA5NjM0MDgxMX0.AtulQjBLZwvO41LC9nBX1CucpzCWk3mJ3U7hOeUyvis";
const AUTO_MS = 3 * 60 * 60 * 1000;

const STATES = ["Andhra Pradesh","Arunachal Pradesh","Assam","Bihar","Chhattisgarh","Delhi","Goa","Gujarat","Haryana","Himachal Pradesh","Jharkhand","Karnataka","Kerala","Madhya Pradesh","Maharashtra","Manipur","Meghalaya","Mizoram","Nagaland","Odisha","Punjab","Rajasthan","Sikkim","Tamil Nadu","Telangana","Tripura","Uttar Pradesh","Uttarakhand","West Bengal"];
const COUNTRIES = ["Bangladesh","Sri Lanka","Nepal","Myanmar","Thailand","Vietnam","Malaysia","Singapore","Indonesia","Philippines","South Korea","Japan","UAE","Saudi Arabia","Qatar","Kuwait","Bahrain","Oman","Jordan","Cambodia","Laos","Bhutan","Maldives"];

let activeTab="hospital", manualRegion="india", autoRegion="india";
let currentLeads=[], autoEnabled=false, autoTimer=null, cdTimer=null, nextRun=null;

function ss(v){
  if(v==null)return"";
  if(typeof v==="object"){
    if(Array.isArray(v))return v.map(ss).join(", ");
    const vals=Object.values(v).filter(x=>x!=null&&x!=="");
    return vals.join(", ");
  }
  return String(v);
}

function switchTab(t){
  activeTab=t; currentLeads=[];
  document.getElementById("results").innerHTML="";
  document.getElementById("actBtns").style.display="none";
  document.getElementById("pmsg").style.display="none";
  document.getElementById("errBox").style.display="none";
  document.getElementById("tabH").className="tab "+(t==="hospital"?"th":"toff");
  document.getElementById("tabE").className="tab "+(t==="engineer"?"te":"toff");
  document.getElementById("dotClr").style.color=t==="hospital"?"#00c2a8":"#ff6b35";
}

function setAutoRegion(r){
  autoRegion=r;
  ["india","asia","both"].forEach(x=>document.getElementById("art-"+x).className="rtab"+(x===r?" on":""));
}

function setManualRegion(r){
  manualRegion=r;
  ["india","asia","custom"].forEach(x=>document.getElementById("mrt-"+x).className="rtab"+(x===r?" on":""));
  document.getElementById("stateDiv").style.display=r==="india"?"block":"none";
  document.getElementById("countryDiv").style.display=r==="asia"?"block":"none";
}

function setProg(pct,status){
  document.getElementById("progBox").style.display="block";
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("progStat").textContent=status;
}

// Backend API proxy — calls Render.com server which calls Anthropic with web search
const BACKEND_URL = "https://zorayx-lead-agent.onrender.com";

async function searchAndExtractLeads(description, location, leadType){
  const res = await fetch(`${BACKEND_URL}/search-leads`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ description, location, leadType })
  });
  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error || `Backend error ${res.status}`);
  }
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return Array.isArray(data.leads) ? data.leads : [];
}

async function generateLeads(description, leadType, region, specificLoc){
  const allLeads=[], seen=new Set();

  const addLeads = (leads) => {
    leads.forEach(l=>{
      const k=ss(l.name).toLowerCase();
      if(k&&!seen.has(k)){seen.add(k);allLeads.push(l);}
    });
  };

  // Single specific location
  if(specificLoc && specificLoc!=="all"){
    setProg(10,`Searching ${specificLoc} on the web…`);
    try{
      const leads = await searchAndExtractLeads(description, specificLoc, leadType);
      addLeads(leads);
    }catch(e){console.warn(e.message); throw e;}
    setProg(100,`Found ${allLeads.length} leads`);
    return allLeads;
  }

  // Multi-location sweep — do 3 locations per run to stay fast
  let locs=[];
  if(region==="india"||region==="both") locs=[...locs,...STATES];
  if(region==="asia"||region==="both") locs=[...locs,...COUNTRIES];
  const batch=locs.slice(0,3);

  for(let i=0;i<batch.length;i++){
    const loc=batch[i];
    setProg(Math.round(10+(i/batch.length)*80),`Searching ${loc} on the web…`);
    try{
      const leads = await searchAndExtractLeads(description, loc, leadType);
      addLeads(leads);
    }catch(e){console.warn(`${loc}:`,e.message);}
    await new Promise(r=>setTimeout(r,500));
  }
  setProg(100,`Found ${allLeads.length} leads across ${batch.length} locations`);
  return allLeads;
}

async function searchLeads(){
  const query=document.getElementById("mQuery").value.trim();
  if(!query)return;
  const specLoc = manualRegion==="india"
    ? document.getElementById("stateSelect").value
    : manualRegion==="asia"
      ? document.getElementById("countrySelect").value
      : null;

  document.getElementById("findBtn").textContent="Searching…";
  document.getElementById("findBtn").disabled=true;
  document.getElementById("loader").style.display="block";
  document.getElementById("progBox").style.display="block";
  document.getElementById("errBox").style.display="none";
  document.getElementById("results").innerHTML="";
  document.getElementById("actBtns").style.display="none";
  document.getElementById("pmsg").style.display="none";
  currentLeads=[];

  try{
    setProg(5,"Connecting to search engine…");
    currentLeads=await generateLeads(query,activeTab,manualRegion,specLoc);
    if(!currentLeads.length){showErr("No leads found. Try a specific state or simpler description.");}
    else{renderLeads(currentLeads,query);document.getElementById("actBtns").style.display="flex";}
  }catch(e){showErr(e.message);}
  finally{
    document.getElementById("loader").style.display="none";
    document.getElementById("findBtn").textContent="Find Leads →";
    document.getElementById("findBtn").disabled=false;
  }
}

async function pushLeads(){
  if(!currentLeads.length)return;
  const btn=document.getElementById("pushBtn"), msg=document.getElementById("pmsg");
  btn.textContent="Pushing…";btn.disabled=true;
  msg.style.display="block";msg.style.color="#a0aab8";msg.textContent="Pushing to Zorayx…";
  try{
    await pushToZorayx(currentLeads,activeTab);
    btn.textContent="✅ Pushed!";btn.className="bpush ok";
    msg.style.color="#00c2a8";msg.textContent=`✅ ${currentLeads.length} leads pushed to Zorayx!`;
  }catch(e){
    btn.textContent="↑ Push to Zorayx";btn.className="bpush";btn.disabled=false;
    msg.style.color="#ff6b6b";msg.textContent="❌ "+e.message;
  }
}

async function pushToZorayx(leads,leadType){
  const rows=leads.map(l=>({
    lead_name: ss(l.contactPerson)||ss(l.name),
    company: ss(l.name),
    lead_source: "Zorayx Lead Agent",
    stage: "New",
    email: ss(l.email),
    phone: ss(l.phone),
    city: ss(l.location),
    product_interest: leadType==="hospital"
      ? (l.equipmentNeeds||[]).map(ss).join(", ")
      : (l.specialization||[]).map(ss).join(", "),
    notes:[
      ss(l.notes),
      leadType==="hospital"
        ?`Type: ${ss(l.type)} | Size: ${ss(l.size)}`
        :`Profile: ${ss(l.profileType)} | Exp: ${ss(l.experience)}`,
      `Dept: ${ss(l.department)||ss(l.outreach)}`,
      `Score: ${ss(l.score)||ss(l.platformFit)}`,
      l.sourceUrl?`Source: ${ss(l.sourceUrl)}`:""
    ].filter(Boolean).join(" | "),
    expected_value:0
  }));
  const res=await fetch(`${SUPA_URL}/rest/v1/leads`,{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(rows)
  });
  if(!res.ok){
    const txt=await res.text().catch(()=>"");
    let m=`Supabase error ${res.status}`;
    try{const j=JSON.parse(txt);m=j.message||j.hint||j.details||m;}catch(e){}
    throw new Error(m);
  }
}

function toggleAuto(){autoEnabled?stopAuto():startAuto();}

function startAuto(){
  const q=document.getElementById("autoQuery").value.trim();
  if(!q){alert("Enter a search query for auto-mode first.");return;}
  autoEnabled=true;
  document.getElementById("autoBtn").textContent="⏹ Stop Auto";
  document.getElementById("autoBtn").className="bstop";
  document.getElementById("autoBadge").style.display="flex";
  document.getElementById("autoLog").style.display="block";
  runAuto();
  autoTimer=setInterval(runAuto,AUTO_MS);
}

function stopAuto(){
  autoEnabled=false;clearInterval(autoTimer);clearInterval(cdTimer);nextRun=null;
  document.getElementById("autoBtn").textContent="▶ Start Auto";
  document.getElementById("autoBtn").className="bp";
  document.getElementById("autoBadge").style.display="none";
  document.getElementById("countdown").textContent="—";
}

async function runAuto(){
  const q=document.getElementById("autoQuery").value.trim();
  const t=document.getElementById("autoType").value;
  const time=new Date().toLocaleTimeString();
  addLog(time,"run","🔍 Searching web for leads…");
  nextRun=Date.now()+AUTO_MS; startCD();
  try{
    const leads=await generateLeads(q,t,autoRegion,null);
    if(leads.length){
      await pushToZorayx(leads,t);
      addLog(time,"ok",`✅ ${leads.length} real leads pushed to Zorayx`);
    }else{
      addLog(time,"err","⚠️ No leads found this run");
    }
  }catch(e){addLog(time,"err","❌ "+e.message);}
}

function startCD(){
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    if(!nextRun)return;
    const d=nextRun-Date.now();
    if(d<=0){document.getElementById("countdown").textContent="Running…";return;}
    const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
    document.getElementById("countdown").textContent=`${h}h ${m}m ${s}s`;
  },1000);
}

function addLog(time,type,msg){
  const el=document.getElementById("logEntries");
  const c=type==="ok"?"#00c2a8":type==="err"?"#ff6b6b":"#a0aab8";
  el.innerHTML=`<div class="logentry" style="color:${c}"><span class="lt">${time}</span>${msg}</div>`+el.innerHTML;
  const all=el.querySelectorAll(".logentry");
  if(all.length>10)all[all.length-1].remove();
}

function showErr(msg){
  const el=document.getElementById("errBox");el.style.display="block";el.textContent="⚠️ "+msg;
}

function scColor(s){
  if(!s)return"#888";const v=s.toLowerCase();
  if(v==="hot"||v==="high")return"#ff4444";
  if(v==="warm"||v==="medium")return"#ff9900";
  return"#00aaff";
}

function renderLeads(leads,query){
  const color=activeTab==="hospital"?"#00c2a8":"#ff6b35";
  let html=`<div class="rhdr"><div class="rtitle">${leads.length} leads found<span class="rsub">"${query.slice(0,50)}${query.length>50?"…":""}"</span></div></div>`;
  leads.forEach(lead=>{
    const score=activeTab==="hospital"?lead.score:lead.platformFit;
    const sc=scColor(ss(score));
    const tags=(activeTab==="hospital"?lead.equipmentNeeds:lead.specialization)||[];
    const cp=ss(lead.contactPerson), dept=ss(lead.department)||ss(lead.outreach);
    const phone=ss(lead.phone), email=ss(lead.email), src=ss(lead.sourceUrl);
    html+=`<div class="lcard">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
        <span class="lname">${ss(lead.name)}</span>
        <span class="lbadge">${activeTab==="hospital"?ss(lead.type):ss(lead.profileType)}</span>
        <span class="sbadge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${ss(score)||"—"}</span>
      </div>
      <div class="lloc">📍 ${ss(lead.location)}${(lead.size||lead.experience)?` · ${ss(lead.size)||ss(lead.experience)}`:""}</div>
      <div class="tags">${tags.map(t=>`<span class="tag" style="background:${color}18;color:${color};border:1px solid ${color}33">${ss(t)}</span>`).join("")}</div>
      <div class="cbox">
        ${cp?`<div class="ci"><span class="cl">👤 </span><span class="cw">${cp}</span></div>`:""}
        ${dept?`<div class="ci"><span class="cl">🏢 </span><span class="cw">${dept}</span></div>`:""}
        ${phone?`<div class="ci"><span class="cl">📞 </span><span class="ct">${phone}</span></div>`:""}
        ${email?`<div class="ci"><span class="cl">✉️ </span><span class="cb">${email}</span></div>`:""}
      </div>
      ${src?`<div class="srclink">🔗 <a href="${src}" target="_blank">${src.slice(0,70)}</a></div>`:""}
      ${lead.notes?`<div class="lnotes">${ss(lead.notes)}</div>`:""}
    </div>`;
  });
  document.getElementById("results").innerHTML=html;
}

function exportCSV(){
  if(!currentLeads.length)return;
  const H=activeTab==="hospital"
    ?["Name","Type","Location","Size","Equipment Needs","Contact Person","Phone","Email","Department","Score","Source","Notes"]
    :["Name","Profile Type","Location","Specialization","Experience","Contact Person","Phone","Email","Outreach","Platform Fit","Source","Notes"];
  const R=currentLeads.map(l=>activeTab==="hospital"
    ?[l.name,l.type,l.location,l.size,(l.equipmentNeeds||[]).map(ss).join("; "),ss(l.contactPerson),l.phone,l.email,l.department,l.score,l.sourceUrl||"",l.notes||""]
    :[l.name,l.profileType,l.location,(l.specialization||[]).map(ss).join("; "),l.experience,ss(l.contactPerson),l.phone,l.email,l.outreach,l.platformFit,l.sourceUrl||"",l.notes||""]);
  const csv=[H,...R].map(r=>r.map(c=>`"${ss(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  try{
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`zorayx-leads-${activeTab}-${Date.now()}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    navigator.clipboard.writeText(csv)
      .then(()=>alert("CSV copied to clipboard! Paste into a .csv file."))
      .catch(()=>alert("Could not download. Try opening in Chrome."));
  }
}
</script>
